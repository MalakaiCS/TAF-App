name: Build & Release

# On a version tag (e.g. v2.0.1): build the exe + installer and publish a
# GitHub Release with the installer attached — installed clients then
# auto-update from it (see taf_order_app/updater.py).
#
# On manual dispatch: build only, upload the installer as an artifact.
#
# The Supabase anon key is injected from the SUPABASE_ANON_KEY Actions secret
# so it is never committed to the repo.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write        # needed for gh release create

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # so annotated tag messages are available

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write settings.json from secret
        shell: bash
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_ANON_KEY secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          cat > settings.json <<EOF
          {
            "custom_media_types": [],
            "supabase_anon_key": "${SUPABASE_ANON_KEY}"
          }
          EOF
          echo "settings.json written (key hidden)."

      - name: Build app (PyInstaller)
        run: pyinstaller --noconfirm --clean TAFOrderEntry.spec

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TAFOrderEntry_Setup
          path: TAFOrderEntry_Setup.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES="$(git tag -l --format='%(contents)' "$TAG")"
          gh release create "$TAG" "TAFOrderEntry_Setup.exe" \
            --title "TAF Order Entry $TAG" \
            --notes "${NOTES:-Release $TAG}"
