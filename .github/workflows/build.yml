name: Build & Release

# Two ways to cut a release:
#   • From your PHONE / browser: Actions tab → "Build & Release" → Run workflow
#       → type the version (e.g. 2.0.3) → Run. CI bumps the version, builds the
#       installer, and publishes the GitHub Release.
#   • From a PC: `python push_update.py 2.0.3 "notes"` (pushes a v* tag).
#
# Installed apps auto-update from the published Release (see taf_order_app/updater.py).
# Requires the SUPABASE_ANON_KEY Actions secret and a public repo.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, e.g. 2.0.3'
        required: true
      notes:
        description: 'Release notes (optional; auto-generated if blank)'
        required: false
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
            echo "$V" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || { echo "::error::Version must look like 2.0.3"; exit 1; }
            echo "bump=true" >> "$GITHUB_OUTPUT"
          else
            V="${GITHUB_REF_NAME#v}"
            echo "bump=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V"    >> "$GITHUB_OUTPUT"
          echo "Releasing v$V"

      - name: Bump version, commit & tag (phone/dispatch only)
        if: steps.ver.outputs.bump == 'true'
        shell: bash
        run: |
          V="${{ steps.ver.outputs.version }}"
          sed -i -E 's/APP_VERSION = "[^"]+"/APP_VERSION = "'"$V"'"/' taf_order_app/updater.py
          sed -i -E 's/^AppVersion=.*/AppVersion='"$V"'/'            installer.iss
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add taf_order_app/updater.py installer.iss
          git commit -m "Release v$V" || echo "no version change to commit"
          git push origin "HEAD:${{ github.ref_name }}"
          git tag -f "v$V"
          git push origin "v$V" --force

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Syntax check (fail fast before shipping)
        shell: bash
        run: python -m compileall -q modern_order_gui.py pdf_generator.py template_filler.py taf_order_app

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write settings.json from secret
        shell: bash
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_ANON_KEY secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          cat > settings.json <<EOF
          {
            "custom_media_types": [],
            "supabase_anon_key": "${SUPABASE_ANON_KEY}"
          }
          EOF
          echo "settings.json written (key hidden)."

      - name: Fetch PDFtoPrinter helper (viewer-free PDF printing)
        shell: bash
        run: |
          URL="http://www.columbia.edu/~em36/PDFtoPrinter.exe"
          for i in 1 2 3; do
            curl -fL --retry 3 -o PDFtoPrinter.exe "$URL" && break
            echo "PDFtoPrinter download attempt $i failed"; sleep 3
          done
          if [ -f PDFtoPrinter.exe ] && [ "$(stat -c%s PDFtoPrinter.exe 2>/dev/null || echo 0)" -gt 100000 ] \
             && head -c2 PDFtoPrinter.exe | grep -q "MZ"; then
            echo "PDFtoPrinter.exe fetched ($(stat -c%s PDFtoPrinter.exe) bytes)."
          else
            echo "::warning::PDFtoPrinter.exe not fetched or invalid — the app will fall back to the shell-verb print path for this build."
            rm -f PDFtoPrinter.exe
          fi

      - name: Build app (PyInstaller)
        run: pyinstaller --noconfirm --clean TAFOrderEntry.spec

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss'

      - name: Publish GitHub Release (setup.exe)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if [ -n "${{ github.event.inputs.notes }}" ]; then
            gh release create "$TAG" "TAFOrderEntry_Setup.exe" \
              --title "TAF Order Entry $TAG" --notes "${{ github.event.inputs.notes }}" \
            || gh release upload "$TAG" "TAFOrderEntry_Setup.exe" --clobber
          else
            gh release create "$TAG" "TAFOrderEntry_Setup.exe" \
              --title "TAF Order Entry $TAG" --generate-notes \
            || gh release upload "$TAG" "TAFOrderEntry_Setup.exe" --clobber
          fi
